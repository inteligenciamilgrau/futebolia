<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuteboliA - AI 1v1 Arena</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050a14;
            --card: rgba(20, 30, 50, 0.7);
            --primary: #3b82f6;
            --secondary: #10b981;
            --brasil: #fde100;
            --argentina: #75b2dd;
            --text: #f8fafc;
            --accent: #6366f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 2rem;
            overflow: hidden;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        /* Glassmorphism Panel */
        .panel {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .panel:hover { border-color: rgba(255, 255, 255, 0.2); }

        /* Configuration Styles */
        .config-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
        }

        input, select, textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 0.75rem;
            font-size: 0.875rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        textarea { resize: none; font-family: 'Inter', sans-serif; line-height: 1.5; }

        /* Center Arena */
        .arena-main {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .game-state-card {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 32px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .pitch-svg {
            width: 400px;
            height: 600px;
            opacity: 0.5;
        }

        .stats-overlay {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            gap: 2rem;
        }

        .stat-item { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 900; color: white; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }

        /* Buttons */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: 'Outfit', sans-serif;
        }

        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-step { background: var(--accent); }
        .btn-play { background: var(--secondary); }
        .btn-stop { background: #ef4444; }

        /* Log / Console */
        .console {
            height: 200px;
            background: #000;
            border-radius: 16px;
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            color: #10b981;
            overflow-y: auto;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .log-entry { margin-bottom: 0.5rem; border-left: 2px solid #333; padding-left: 0.5rem; }
        .log-time { color: #666; }
        .log-player1 { border-color: var(--brasil); }
        .log-player2 { border-color: var(--argentina); }

        /* Player Colors Headers */
        .player1-header { color: var(--brasil); }
        .player2-header { color: var(--argentina); }

        .controls-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        #goal-notification {
            position: absolute;
            font-size: 100px;
            font-weight: 900;
            color: var(--brasil);
            text-shadow: 0 0 40px rgba(0,0,0,1);
            display: none;
            z-index: 100;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        .coord-label {
            font-size: 8px;
            fill: #94a3b8;
            font-weight: 700;
            user-select: none;
            pointer-events: none;
            display: none; /* Default hidden */
        }
        .show-coords .coord-label { display: block; }
        /* Prompt Modal */
        #prompt-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: none;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            gap: 1rem;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #prompt-body {
            flex: 1;
            background: #000;
            border-radius: 12px;
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #10b981;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .btn-view-prompt {
            background: rgba(255, 255, 255, 0.1);
            font-size: 0.7rem;
            padding: 0.4rem 0.8rem;
            margin-top: 0.5rem;
        }

        .btn-view-prompt:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <!-- Left Panel: Brasil Config -->
    <div class="panel">
        <div class="config-header">
            <h2 class="player1-header">🇧🇷 BRASIL (P1)</h2>
        </div>
        
        <div style="display: flex; gap: 1rem; align-items: center; background: rgba(255,255,255,0.05); padding: 0.5rem; border-radius: 12px; margin-bottom: 0.5rem;">
            <input type="checkbox" id="p1-active" style="width: auto;" checked onchange="saveActivity(1)">
            <label for="p1-active" style="cursor: pointer; margin-bottom: 0; color: var(--brasil);">ATIVAR IA (BRASIL)</label>
        </div>
        
        <div>
            <label>Modelo IA</label>
            <select id="p1-model"><option>Carregando modelos...</option></select>
        </div>

        <div style="display: flex; gap: 0.5rem; flex-direction: column;">
            <label>Nome do Jogador</label>
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="p1-name" placeholder="Brasil P1" style="flex: 1;">
                <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.75rem;" onclick="updateName(1)">Set</button>
            </div>
        </div>

        <div>
            <label>Prompt de Sistema</label>
            <textarea id="p1-prompt" rows="18">Você é o craque da Seleção Brasileira!
O campo tem X: 0-200 e Y: 0-300 (Xadrez: A-J, 1-15). Sua meta o GOL em Y=0.
DICA TÁTICA: Com a bola, DESVIE do adversário para não ser desarmado.
VISÃO (Ray Tracing): O servidor informa o que está na sua frente (gol, bola, adversário). Se estiver com a bola, o raio mostra se o caminho para o gol está livre.
PULL: Se a bola passou de você ou está na direção errada, use {"type":"pull"} para trazê-la de volta.
MOVIMENTO: Envie o quadrado alvo. Ex: {"thinking":"Driblando!","type":"move","target":"F8"}
CHUTE (Kick): Use EXATAMENTE este formato JSON: {"type":"kick", "power": 1}.
- Power 1: PERTO (Mais certeiro/preciso). Use para empurrar pro gol se estiver perto.
- Power 2: MÉDIO. Use para passes ou chutes de média distância.
- Power 3: MUITO LONGO (Forte). Use para isolar a bola ou tentar de longe.
IMPORTANTE: NUNCA use kick() ou kick(1). Envie APENAS o JSON puro.</textarea>
            <button class="btn btn-view-prompt" onclick="openPromptModal(1)">🔍 Ver Último Prompt (P1)</button>
        </div>
    </div>

    <!-- Center Panel: Arena -->
    <div class="arena-main">
        <div class="panel" style="flex-direction: row; justify-content: space-between; align-items: center; padding: 1rem 2rem;">
            <div style="display: flex; gap: 2rem; flex: 1;">
                <div style="flex: 1;">
                    <label>Omni Route API Host</label>
                    <input type="text" id="api-host" value="https://api.omniroute.ai/v1" placeholder="https://...">
                </div>
                <div style="flex: 1;">
                    <label>API Key</label>
                    <input type="password" id="api-key" placeholder="Sua chave secreta...">
                </div>
            </div>
            <button class="btn" style="margin-left: 1rem; padding: 0.75rem 1.5rem;" onclick="refreshModels()">🔄 Sync</button>
        </div>

        <div class="panel" style="padding: 1rem; flex-direction: row; align-items: center; gap: 1rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 1rem;">
                <input type="checkbox" id="toggle-coords" style="width: auto;" onchange="updateCoordsVisibility()">
                <label for="toggle-coords" style="cursor: pointer; margin-bottom: 0;">Coordenadas (A-J)</label>
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="toggle-magnetic" style="width: auto;" checked onchange="updateMagneticBall()">
                <label for="toggle-magnetic" style="cursor: pointer; margin-bottom: 0; color: #ffeb3b;">🧲 Bola Magnética</label>
            </div>
        </div>

        <div class="game-state-card" id="arena-visual">
            <div id="goal-notification">GOL!</div>
            <div class="stats-overlay">
                <div class="stat-item">
                    <div class="stat-value" id="score-a" style="color: var(--brasil);">0</div>
                    <div class="stat-label">Brasil</div>
                </div>
                <div class="stat-item" style="display: flex; align-items: center; justify-content: center; font-size: 24px; opacity: 0.5; padding-top: 10px;">X</div>
                <div class="stat-item">
                    <div class="stat-value" id="score-b" style="color: var(--argentina);">0</div>
                    <div class="stat-label">Argentina</div>
                </div>
                <div class="stat-item" style="margin-left: 2rem;">
                    <div class="stat-value" id="game-time" style="font-size: 1.5rem; margin-top: 0.5rem;">05:00</div>
                    <div class="stat-label">Tempo</div>
                </div>
            </div>
            
            <svg class="pitch-svg" viewBox="0 0 200 300">
                <rect x="0" y="0" width="200" height="300" fill="#1e3a8a33" stroke="white" stroke-width="2"/>
                <line x1="0" y1="150" x2="200" y2="150" stroke="white" stroke-width="1"/>
                <circle cx="100" cy="150" r="30" fill="none" stroke="white" stroke-width="1"/>
                <rect x="70" y="0" width="60" height="20" fill="none" stroke="white" stroke-width="1"/>
                <rect x="70" y="280" width="60" height="20" fill="none" stroke="white" stroke-width="1"/>
                <!-- Flag Brasil (Y=300 / Defesa) -->
                <g transform="translate(40, 260)">
                    <rect width="20" height="15" fill="#009b3a" stroke="white" stroke-width="1"/>
                    <circle cx="10" cy="7.5" r="4" fill="#002776"/>
                </g>
                <!-- Flag Argentina (Y=0 / Defesa) -->
                <g transform="translate(140, 25)">
                    <rect width="20" height="15" fill="#75b2dd" stroke="white" stroke-width="1"/>
                    <rect y="5" width="20" height="5" fill="white"/>
                </g>

                <!-- Chess Coord Labels -->
                <g id="coord-labels-x"></g>
                <g id="coord-labels-y"></g>

                <!-- Players & Ball added by JS -->
                <g id="dynamic-elements"></g>
            </svg>
        </div>

        <div class="controls-row">
            <button class="btn btn-step" onclick="takeStep()">⚡ Executar Turno (Single)</button>
            <div style="display: flex; gap: 0.5rem;">
                <button id="btn-play" class="btn btn-play" style="flex: 1;" onclick="startLoop()">▶ Iniciar Arena Loop</button>
                <button id="btn-stop" class="btn btn-stop" style="display: none;" onclick="stopLoop()">⏹ Parar</button>
            </div>
        </div>

        <div id="log-console" class="console">
            <div class="log-entry">Arena iniciada. Aguardando configuração de API...</div>
        </div>
    </div>

    <!-- Right Panel: Argentina Config -->
    <div class="panel">
        <div class="config-header">
            <h2 class="player2-header">🇦🇷 ARGENTINA (P2)</h2>
        </div>
        
        <div style="display: flex; gap: 1rem; align-items: center; background: rgba(255,255,255,0.05); padding: 0.5rem; border-radius: 12px; margin-bottom: 0.5rem;">
            <input type="checkbox" id="p2-active" style="width: auto;" checked onchange="saveActivity(2)">
            <label for="p2-active" style="cursor: pointer; margin-bottom: 0; color: var(--argentina);">ATIVAR IA (ARGENTINA)</label>
        </div>

        <div>
            <label>Modelo IA</label>
            <select id="p2-model"><option>Carregando modelos...</option></select>
        </div>

        <div style="display: flex; gap: 0.5rem; flex-direction: column;">
            <label>Nome do Jogador</label>
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="p2-name" placeholder="Argentina P2" style="flex: 1;">
                <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.75rem;" onclick="updateName(2)">Set</button>
            </div>
        </div>

        <div>
            <label>Prompt de Sistema</label>
            <textarea id="p2-prompt" rows="18">¡Sos el 10 de la Selección Argentina!
El campo es de X: 0-200 y Y: 0-300 (Ajedrez: A-J, 1-15). Tu meta o ARCO em Y=300.
TÁCTICA: Con la pelota, GAMBETEÁ (evitá) al rival para que no te la saque.
VISIÓN (Ray Tracing): El servidor te dice qué hay adelante (arco, pelota, rival). Si tenés la pelota, el rayo te dice se el camino al arco está libre.
PULL: Si la pelota te pasó o está mal ubicada, usá {"type":"pull"} para acomodarla.
MOVIMIENTO: Enviá el cuadrado objetivo. Ex: {"thinking":"¡Gambeta!","type":"move","target":"E12"}
REMATE (Kick): Usá EXACTAMENTE este formato JSON: {"type":"kick", "power": 1}.
- Power 1: CERCA (Más certero/preciso). Usalo para empujar al arco si estás cerca.
- Power 2: MEDIO. Usalo para pases o remates de media distancia.
- Power 3: MUY LARGO (Fuerte). Usalo para despejar o intentar desde lejos.
IMPORTANTE: NUNCA uses kick() o kick(1). Enviá SOLO el JSON puro.</textarea>
            <button class="btn btn-view-prompt" onclick="openPromptModal(2)">🔍 Ver Último Prompt (P2)</button>
        </div>
    </div>

    <!-- Modal for Prompt Viewing -->
    <div id="prompt-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Último Prompt Enviado</h2>
                <button class="btn btn-stop" style="padding: 0.5rem 1rem;" onclick="closePromptModal()">X</button>
            </div>
            <div id="prompt-body">Nenhum prompt enviado ainda. Execute um turno primeiro.</div>
            <div style="font-size: 0.8rem; color: #94a3b8; text-align: center;">Pressione ESC ou clique em X para fechar</div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let lastState = null;
        let lastPrompts = { 1: null, 2: null };


        // Configuration Persistence
        document.addEventListener('DOMContentLoaded', () => {
            const savedHost = localStorage.getItem('arena_api_host');
            if (savedHost) document.getElementById('api-host').value = savedHost;
            
            const savedCoords = localStorage.getItem('arena_show_coords') === 'true';
            document.getElementById('toggle-coords').checked = savedCoords;
            if (savedCoords) document.getElementById('arena-visual').classList.add('show-coords');

            document.getElementById('api-host').addEventListener('change', (e) => {
                localStorage.setItem('arena_api_host', e.target.value);
            });

            // Activity Persistence
            const p1Active = localStorage.getItem('arena_p1_active') !== 'false'; 
            const p2Active = localStorage.getItem('arena_p2_active') !== 'false';
            document.getElementById('p1-active').checked = p1Active;
            document.getElementById('p2-active').checked = p2Active;

            const magActive = localStorage.getItem('arena_magnetic_ball') !== 'false';
            document.getElementById('toggle-magnetic').checked = magActive;
            updateMagneticBall(); // Sincroniza inicial

            document.getElementById('p1-model').addEventListener('change', (e) => {
                localStorage.setItem('arena_p1_model', e.target.value);
            });

            document.getElementById('p2-model').addEventListener('change', (e) => {
                localStorage.setItem('arena_p2_model', e.target.value);
            });

            initCoordLabels();
            fetchGameState();
        });

        function updateCoordsVisibility() {
            const isChecked = document.getElementById('toggle-coords').checked;
            localStorage.setItem('arena_show_coords', isChecked);
            const visual = document.getElementById('arena-visual');
            if (isChecked) visual.classList.add('show-coords');
            else visual.classList.remove('show-coords');
        }

        function saveActivity(playerNum) {
            const isChecked = document.getElementById(`p${playerNum}-active`).checked;
            localStorage.setItem(`arena_p${playerNum}_active`, isChecked);
        }

        function updateMagneticBall() {
            const isChecked = document.getElementById('toggle-magnetic').checked;
            localStorage.setItem('arena_magnetic_ball', isChecked);
            sendToGame(1, { type: 'toggleMagneticBall', active: isChecked });
        }

        function initCoordLabels() {
            const gX = document.getElementById('coord-labels-x');
            const gY = document.getElementById('coord-labels-y');
            const letters = "ABCDEFGHIJ";
            
            // X labels (A-J)
            for (let i = 0; i < 10; i++) {
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", (i * 20) + 10);
                text.setAttribute("y", 10);
                text.setAttribute("text-anchor", "middle");
                text.className.baseVal = "coord-label";
                text.textContent = letters[i];
                gX.appendChild(text);

                const textBottom = text.cloneNode(true);
                textBottom.setAttribute("y", 295);
                gX.appendChild(textBottom);
            }

            // Y labels (1-15)
            for (let i = 0; i < 15; i++) {
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", 5);
                text.setAttribute("y", (i * 20) + 12);
                text.setAttribute("text-anchor", "start");
                text.className.baseVal = "coord-label";
                text.textContent = (i + 1);
                gY.appendChild(text);

                const textRight = text.cloneNode(true);
                textRight.setAttribute("x", 195);
                textRight.setAttribute("text-anchor", "end");
                gY.appendChild(textRight);
            }
        }

        async function log(msg, type = '') {
            const consoleEl = document.getElementById('log-console');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            consoleEl.prepend(entry);
        }

        async function refreshModels() {
            const host = document.getElementById('api-host').value;
            const key = document.getElementById('api-key').value || ""; // Default empty
            
            try {
                log("Sincronizando modelos...");
                const response = await fetch(`${host}/models`, {
                    headers: { 'Authorization': `Bearer ${key}` }
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                const p1Select = document.getElementById('p1-model');
                const p2Select = document.getElementById('p2-model');
                
                const savedP1 = localStorage.getItem('arena_p1_model');
                const savedP2 = localStorage.getItem('arena_p2_model');

                p1Select.innerHTML = "";
                p2Select.innerHTML = "";
                
                data.data.forEach(model => {
                    const opt1 = document.createElement('option');
                    opt1.value = model.id;
                    opt1.text = model.id;
                    if (model.id === savedP1) opt1.selected = true;
                    p1Select.add(opt1);
                    
                    const opt2 = document.createElement('option');
                    opt2.value = model.id;
                    opt2.text = model.id;
                    if (model.id === savedP2) opt2.selected = true;
                    p2Select.add(opt2);
                });

                log("Modelos sincronizados!");
                return true;
            } catch (err) {
                log(`Erro ao buscar modelos: ${err.message}`, 'log-error');
                return false;
            }
        }

        async function fetchGameState() {
            try {
                const response = await fetch('/state?roomId=1v1');
                lastState = await response.json();
                updateVisual(lastState);
            } catch (err) {
                console.error("Erro ao buscar estado:", err);
            }
        }

        function updateVisual(state) {
            document.getElementById('score-a').innerText = state.score.A;
            document.getElementById('score-b').innerText = state.score.B;
            
            const mins = Math.floor(state.gameTime / 60).toString().padStart(2, '0');
            const secs = Math.floor(state.gameTime % 60).toString().padStart(2, '0');
            document.getElementById('game-time').innerText = `${mins}:${secs}`;

            const dynamic = document.getElementById('dynamic-elements');
            dynamic.innerHTML = "";

            // Ball
            const ball = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            ball.setAttribute("cx", state.ball.x + 100);
            ball.setAttribute("cy", state.ball.z + 150);
            ball.setAttribute("r", "4");
            ball.setAttribute("fill", "white");
            ball.setAttribute("filter", "drop-shadow(0 0 5px #fff)");
            dynamic.appendChild(ball);

            // Players
            state.players.forEach(p => {
                const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
                
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", p.x + 100);
                circle.setAttribute("cy", p.z + 150);
                circle.setAttribute("r", "8");
                circle.setAttribute("fill", p.team === 'A' ? "#fde100" : "#75b2dd");
                group.appendChild(circle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", p.x + 100);
                text.setAttribute("y", p.z + 150 + 4);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("font-size", "10");
                text.setAttribute("font-weight", "bold");
                text.setAttribute("fill", "#000");
                text.textContent = p.id === 1 ? "P1" : "P2";
                group.appendChild(text);

                dynamic.appendChild(group);
            });

            const goalNotif = document.getElementById('goal-notification');
            if (state.isGoal) {
                goalNotif.style.display = 'block';
            } else {
                goalNotif.style.display = 'none';
            }
        }

        function translateCoord(x, z) {
            // Interno (-100 a 100, -150 a 150) -> AI (0 a 200, 0 a 300)
            // No jogo Z é o comprimento, na IA chamamos de Y.
            const ax = Math.round(x + 100);
            const ay = Math.round(z + 150);
            
            // Chess notation calculation (A-J, 1-15)
            // X is 0-200, 10 sections of 20 units
            // Y is 0-300, 15 sections of 20 units
            const letters = "ABCDEFGHIJ";
            const chessX = letters[Math.min(9, Math.floor(ax / 20))];
            const chessY = Math.min(15, Math.floor(ay / 20) + 1);
            
            return {
                x: ax,
                y: ay,
                chess: `${chessX}${chessY}`
            };
        }

        function chessToCoord(chess) {
            if (!chess || chess.length < 2) return null;
            const letters = "ABCDEFGHIJ";
            const char = chess[0].toUpperCase();
            const num = parseInt(chess.substring(1));
            
            const ax = letters.indexOf(char) * 20 + 10;
            const ay = (num - 1) * 20 + 10;
            
            return { x: ax, y: ay };
        }

        async function askAI(playerNum) {
            const host = document.getElementById('api-host').value;
            const key = document.getElementById('api-key').value || ""; 
            const model = document.getElementById(`p${playerNum}-model`).value;
            const systemPrompt = document.getElementById(`p${playerNum}-prompt`).value;

            const meData = lastState.players.find(p => playerNum === 1 ? p.id === 1 : p.id === 6);
            const oppData = lastState.players.find(p => playerNum === 1 ? p.id === 6 : p.id === 1);
            
            const myPos = translateCoord(meData.x, meData.z);
            const ballPos = translateCoord(lastState.ball.x, lastState.ball.z);
            const oppPos = translateCoord(oppData.x, oppData.z);
            
            // Definições fixas do campo traduzido
            const field = { width: 200, length: 300 };
            const myGoal = { x: 100, y: playerNum === 1 ? 300 : 0 };
            const targetGoal = { x: 100, y: playerNum === 1 ? 0 : 300 };

            // Calculando posse de bola (distância < 15 unidades internas)
            const distBall = Math.sqrt(Math.pow(meData.x - lastState.ball.x, 2) + Math.pow(meData.z - lastState.ball.z, 2));
            const hasBall = distBall < 15;

            const simplifiedState = {
                voca: "Você é o Jogador " + (playerNum === 1 ? "1 (Brasil)" : "2 (Argentina)"),
                campo: field,
                posse_de_bola: hasBall,
                minha_posicao: myPos.x + "," + myPos.y + " (Xadrez: " + myPos.chess + ")",
                olhando_para: { x: meData.facingX, y: meData.facingZ },
                visao_raytraycing: meData.ray ? { detectou: meData.ray.type, distancia: meData.ray.distance } : "nada",
                bola: ballPos.x + "," + ballPos.y + " (Xadrez: " + ballPos.chess + ")",
                adversario: oppPos.x + "," + oppPos.y + " (Xadrez: " + oppPos.chess + ")",
                meu_gol: myGoal,
                gol_alvo: targetGoal,
                placar: lastState.score
            };

            try {
                const payload = {
                    model: model,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: `ESTADO DO JOGO EM COORDENADAS X,Y (0-200, 0-300):\n${JSON.stringify(simplifiedState, null, 2)}` }
                    ],
                    response_format: { type: "json_object" }
                };

                // Store for debugging
                lastPrompts[playerNum] = payload;

                log(`P${playerNum} pensando...`, `log-player${playerNum}`);
                const response = await fetch(`${host}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${key}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                let aiResponse = JSON.parse(data.choices[0].message.content);
                
                // Normalização: se a IA mandou "action" em vez de "type", corrigimos aqui
                if (aiResponse.action && !aiResponse.type) {
                    aiResponse.type = aiResponse.action;
                }

                // Lógica de Movimento por Alvo de Xadrez (Simplificado)
                if (aiResponse.type === 'move' && aiResponse.target) {
                    const targetPos = chessToCoord(aiResponse.target);
                    if (targetPos) {
                        aiResponse.dx = Math.sign(targetPos.x - myPos.x);
                        aiResponse.dz = Math.sign(targetPos.y - myPos.y);
                    }
                }

                // Garantia de Power para Chute
                if (aiResponse.type === 'kick' && !aiResponse.power) {
                    aiResponse.power = 1;
                    log(`P${playerNum} não especificou 'power'. Usando nível 1 (curto).`, `log-player${playerNum}`);
                }
                
                return aiResponse;
            } catch (err) {
                log(`P${playerNum} Error: ${err.message}`, 'log-error');
                return null;
            }
        }

        async function sendToGame(playerId, action) {
            await fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    roomId: '1v1',
                    playerId: playerId,
                    isManual: true,
                    ...action
                })
            });
        }

        async function updateName(playerNum) {
            const nameInput = document.getElementById(`p${playerNum}-name`);
            const name = nameInput.value;
            if (!name) return;
            
            log(`P${playerNum} alterando nome para: ${name}...`);
            await sendToGame(playerNum, {
                type: 'config',
                name: name,
                number: playerNum === 1 ? 10 : 7 // Números padrão
            });
        }

        async function takeStep() {
            const p1Select = document.getElementById('p1-model');
            
            // Só tenta sincronizar se não houver modelos (Exceto o default vazio)
            if (p1Select.options.length <= 1) {
                if (!document.getElementById('api-host').value || !document.getElementById('api-key').value) {
                    alert("Modelos não sincronizados. Por favor, configure o API Host e a API Key.");
                    return;
                }

                log("Sincronizando modelos automaticamente...");
                const synced = await refreshModels();
                if (!synced) {
                    alert("Não foi possível sincronizar os modelos automaticamente. Verifique sua chave e host.");
                    return;
                }
            }

            await fetchGameState();
            
            // Brasil turn (P1)
            if (document.getElementById('p1-active').checked) {
                const p1Action = await askAI(1);
                if (p1Action) {
                    if (p1Action.thinking) {
                        log(`Brasil (Pensamento): ${p1Action.thinking}`, 'log-player1');
                        p1Action.text = p1Action.thinking;
                    }
                    let actionDesc = p1Action.type || p1Action.action;
                    if (p1Action.type === 'kick') {
                        actionDesc += ` (Power: ${p1Action.power || '?'})`;
                    } else if (p1Action.type === 'move' && p1Action.target) {
                        actionDesc += ` (${p1Action.target})`;
                    } else if (p1Action.dx !== undefined || p1Action.dz !== undefined) {
                        actionDesc += ` (dx:${p1Action.dx || 0}, dz:${p1Action.dz || 0})`;
                    }

                    log(`Brasil executa: ${actionDesc}`, 'log-player1');
                    await sendToGame(1, p1Action);
                }
            }
            
            await new Promise(r => setTimeout(r, 300));
            await fetchGameState();

            // Argentina turn (P2)
            if (document.getElementById('p2-active').checked) {
                const p2Action = await askAI(2);
                if (p2Action) {
                    if (p2Action.thinking) {
                        log(`Argentina (Pensamento): ${p2Action.thinking}`, 'log-player2');
                        p2Action.text = p2Action.thinking;
                    }
                    let actionDesc = p2Action.type || p2Action.action;
                    if (p2Action.type === 'kick') {
                        actionDesc += ` (Power: ${p2Action.power || '?'})`;
                    } else if (p2Action.type === 'move' && p2Action.target) {
                        actionDesc += ` (${p2Action.target})`;
                    } else if (p2Action.dx !== undefined || p2Action.dz !== undefined) {
                        actionDesc += ` (dx:${p2Action.dx || 0}, dz:${p2Action.dz || 0})`;
                    }

                    log(`Argentina executa: ${actionDesc}`, 'log-player2');
                    await sendToGame(2, p2Action); 
                }
            }
            
            await fetchGameState();
        }

        let loopTimer = null;
        async function startLoop() {
            isRunning = true;
            document.getElementById('btn-play').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'block';
            log("Loop de Arena iniciado!");
            runLoop();
        }

        async function runLoop() {
            if (!isRunning) return;
            await takeStep();
            loopTimer = setTimeout(runLoop, 200);
        }

        function stopLoop() {
            isRunning = false;
            clearTimeout(loopTimer);
            document.getElementById('btn-play').style.display = 'block';
            document.getElementById('btn-stop').style.display = 'none';
            log("Loop de Arena parado.");
        }

        function openPromptModal(playerNum) {
            const modal = document.getElementById('prompt-modal');
            const body = document.getElementById('prompt-body');
            const title = document.getElementById('modal-title');
            
            title.innerText = `Último Prompt - ${playerNum === 1 ? 'Brasil (P1)' : 'Argentina (P2)'}`;
            
            if (lastPrompts[playerNum]) {
                body.innerText = JSON.stringify(lastPrompts[playerNum], null, 2);
            } else {
                body.innerText = "Nenhum prompt enviado ainda para este jogador. Execute um turno para capturar os dados.";
            }
            
            modal.style.display = 'block';
        }

        function closePromptModal() {
            document.getElementById('prompt-modal').style.display = 'none';
        }

        // Close on ESC
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePromptModal();
        });

        setInterval(fetchGameState, 500);
    </script>
</body>
